<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otology Literature Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a3a5c;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .01em;
    }

    header p {
      font-size: .78rem;
      opacity: .7;
      margin-top: 2px;
    }

    header a {
      color: #a8d0f0;
      font-size: .82rem;
      text-decoration: none;
      border: 1px solid #a8d0f0;
      border-radius: 4px;
      padding: 4px 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    header a:hover { background: rgba(168,208,240,.15); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ai-avatar  { background: #1a3a5c; color: #fff; }
    .user-avatar{ background: #d0e8f8; color: #1a3a5c; }

    .bubble {
      max-width: min(600px, 80%);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: .9rem;
      line-height: 1.55;
    }
    .bubble.ai {
      background: #fff;
      border: 1px solid #dde3eb;
      border-top-left-radius: 2px;
    }
    .bubble.user {
      background: #1a3a5c;
      color: #fff;
      border-top-right-radius: 2px;
    }

    /* markdown inside AI bubble */
    .bubble.ai h1, .bubble.ai h2, .bubble.ai h3 {
      font-size: 1em;
      font-weight: 700;
      margin: .6em 0 .2em;
    }
    .bubble.ai p { margin: .35em 0; }
    .bubble.ai ul, .bubble.ai ol {
      padding-left: 1.4em;
      margin: .35em 0;
    }
    .bubble.ai li { margin: .2em 0; }
    .bubble.ai a { color: #1a3a5c; }
    .bubble.ai strong { font-weight: 700; }
    .bubble.ai code {
      background: #f0f3f7;
      border-radius: 3px;
      padding: 1px 4px;
      font-size: .85em;
    }
    .bubble.ai hr { border: none; border-top: 1px solid #dde3eb; margin: .6em 0; }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #7a8fa6;
      font-size: .82rem;
      font-style: italic;
    }
    .dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #7a8fa6;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: .25; transform: scale(.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    footer {
      background: #fff;
      border-top: 1px solid #dde3eb;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      resize: none;
      border: 1px solid #c8d3df;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .92rem;
      font-family: inherit;
      line-height: 1.4;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
    }
    #input:focus { border-color: #1a3a5c; }

    #send {
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }
    #send:hover { background: #24517f; }
    #send:disabled { background: #8aa5bf; cursor: default; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Otology Literature Assistant</h1>
    <p>Searches ~2,000 PubMed otology papers</p>
  </div>
  <a href="/search">Keyword Search →</a>
</header>

<div id="messages"></div>

<footer>
  <textarea id="input" rows="1"
    placeholder="Ask a clinical question — e.g. 'What are outcomes for cochlear implantation in elderly patients?'"></textarea>
  <button id="send">Ask →</button>
</footer>

<script>
  const API = '/chat';
  const messages = [];

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  marked.setOptions({ breaks: true, gfm: true });

  function addBubble(role, html, isMarkdown = false) {
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'ai' ? 'ai-avatar' : 'user-avatar'}`;
    avatar.textContent = role === 'ai' ? 'AI' : 'You';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    const text = typeof html === 'string' ? html : String(html ?? '');
    if (isMarkdown) {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    row.append(avatar, bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addThinking() {
    const row = document.createElement('div');
    row.className = 'bubble-row ai';
    row.id = 'thinking-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai-avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'thinking';
    bubble.innerHTML = 'Searching literature <span class="dots"><span></span><span></span><span></span></span>';

    row.append(avatar, bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-row');
    if (el) el.remove();
  }

  // Initial greeting
  addBubble('ai',
    "Hello! I'm your otology literature assistant. I search a database of ~2,000 PubMed papers " +
    "to answer your clinical and research questions.\n\n" +
    "Try asking about diagnoses, treatment outcomes, surgical approaches, or anything in the otology literature.",
    true
  );

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addBubble('user', text);
    messages.push({ role: 'user', content: text });

    addThinking();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Server error' }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = typeof data.reply === 'string' ? data.reply : data.error;
      if (!reply) {
        throw new Error('Server returned no reply');
      }
      removeThinking();
      addBubble('ai', reply, true);
      messages.push({ role: 'assistant', content: reply });
    } catch (err) {
      removeThinking();
      addBubble('ai', `Error: ${err.message}`, false);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
